name: amici ENSIP preview pipeline

# ensdomains/ensips gives us no cross-repo webhook to react to, so this polls
# on a schedule instead of triggering per PR-open. See AMICI_PIPELINE.md.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# Prevents two runs from racing on the same shared template/ working copy
# and double-deploying/double-committing state if a run overlaps the next.
concurrency:
  group: amici-pipeline
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - name: Install pipeline-script deps (root package.json)
        run: npm ci

      - name: Install + build the vendored omnipin fork
        working-directory: omnipin
        run: |
          bun install
          bun run build

      - name: Install the Vocs template's deps
        working-directory: template
        run: npm ci --legacy-peer-deps

      - name: Poll ensdomains/ensips, build + deploy changed drafts
        run: npm run poll
        env:
          # Default token — sufficient to *read* ensdomains/ensips (a public
          # repo; reads aren't restricted to the current repo). Do not use
          # this for writes to that repo, it has no authority there.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Optional. Only needed to actually comment the preview link back
          # on the source PR — requires write access to ensdomains/ensips,
          # an external repo, which isn't available as of this writing. Leave
          # unset and the pipeline still builds/pins/updates ENS fine; it
          # just falls back to the step summary + committed PREVIEWS.md
          # below instead of a PR comment. See README's "cross-repo comment
          # permission" section.
          AMICI_ENSIPS_TOKEN: ${{ secrets.AMICI_ENSIPS_TOKEN }}

          # Scoped ENS operator key (Zodiac Roles member), NOT amici.eth's
          # owner key. Never echoed, logged, or written to a file by the
          # pipeline scripts — see AMICI_PIPELINE.md.
          AMICI_SIGNER_KEY: ${{ secrets.AMICI_SIGNER_KEY }}
          AMICI_SAFE: ${{ vars.AMICI_SAFE }}
          AMICI_ROLES_MOD_ADDRESS: ${{ vars.AMICI_ROLES_MOD_ADDRESS }}

          # IPFS pinning providers omnipin uploads to — add more OMNIPIN_*_TOKEN
          # secrets here as needed (see omnipin/skills/omnipin-deploy/SKILL.md
          # for the full provider list).
          OMNIPIN_PINATA_TOKEN: ${{ secrets.OMNIPIN_PINATA_TOKEN }}

      - name: Commit updated pipeline state
        # Uses the default GITHUB_TOKEN (contents: write above) — this only
        # ever pushes to amici itself, never to ensdomains/ensips.
        run: |
          git config user.name "amici-bot"
          git config user.email "amici-bot@users.noreply.github.com"
          git add .amici-state.json PREVIEWS.md
          git diff --cached --quiet || git commit -m "chore: update amici pipeline state"
          git push
